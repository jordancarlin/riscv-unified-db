name: autofix.ci  # needed to securely identify the workflow

on:
  pull_request:
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./bin/chore gen all
      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
