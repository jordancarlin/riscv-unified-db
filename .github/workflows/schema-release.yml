# This workflow creates GitHub releases for schema files that have changed.
# It runs after the CI/CD workflow completes successfully on the main branch.
# Each schema version gets its own release tag (e.g., schemas/<schema_name>/<version>).
# If a schema file has changed relative to the published release, the release
# assets are updated.

name: Schema Release

on:
  workflow_run:
    workflows: [CI/CD]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-schemas:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise environment
        uses: ./.github/actions/mise-setup

      - name: Generate resolved schemas
        run: ./do gen:schemas

      - name: Publish changed schema versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./bin/python tools/scripts/publish_schemas.py
