# yaml-language-server: $schema=../../../schemas/param_schema.json

$schema: param_schema.json#
kind: parameter
name: STVEC_MODES
long_name: |
  Modes supported by `stvec.MODE`
definedBy:
  extension:
    name: S
description: |
  Options:

    0::
      Direct; All traps set `pc` to `stvec.BASE`
    1::
      Vectored; Asynchronous interrupts set `pc` to `stvec.BASE` + 4 x cause.

  If only one mode is given, `stvec.MODE` is assumed to be read-only with that value.
  Otherwise, `stvec.MODE` is read-write.
schema:
  type: array
  items:
    type: integer
    enum: [0, 1]
  minItems: 1
  maxItems: 2
  uniqueItems: true
